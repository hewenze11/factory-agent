name: M4 Blind Integration Test

on:
  workflow_dispatch: {}

jobs:
  blindtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker insecure registry
        run: |
          set -euxo pipefail
          echo '{"insecure-registries":["172.236.254.239:30880"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info | grep -i insecure || true

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_TOOL_PASSWORD }}" | docker login 172.236.254.239:30880 \
            -u "${{ secrets.HARBOR_TOOL_USER }}" --password-stdin

      - name: Install deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: Run blind test
        env:
          IMAGE: 172.236.254.239:30880/factory/agent:latest
          CONTAINER: factory-agent-test
          PORT: "34567"
        run: |
          set -euxo pipefail
          chmod +x ./blindtest.sh
          ./blindtest.sh

      - name: Export diagnostic on failure
        if: failure()
        run: |
          echo "=== Container logs ==="
          docker logs factory-agent-test 2>&1 || true
          echo "=== Export test ==="
          TOKEN=$(docker exec factory-agent-test cat /opt/factory/.factory/agent.token 2>/dev/null || echo "")
          if [[ -n "$TOKEN" ]]; then
            REPOS=$(docker exec factory-agent-test ls /opt/factory/repos/ 2>/dev/null || echo "")
            echo "Repos: $REPOS"
            for REPO in $REPOS; do
              echo "Export body for $REPO:"
              curl -sS "http://127.0.0.1:34567/repo/$REPO/export?format=zip" \
                -H "Authorization: Bearer $TOKEN" -o /tmp/e.zip -w "%{http_code}" || true
            done
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blindtest-artifacts
          path: blindtest-artifacts
