name: M4 Blind Integration Test

on:
  workflow_dispatch: {}

jobs:
  blindtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker insecure registry
        run: |
          set -euxo pipefail
          echo '{"insecure-registries":["172.236.254.239:30880"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info | grep -i insecure || true

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_TOOL_PASSWORD }}" | docker login 172.236.254.239:30880 \
            -u "${{ secrets.HARBOR_TOOL_USER }}" --password-stdin

      - name: Install deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y jq unzip

      - name: Start agent container (diagnostic)
        run: |
          echo '{"insecure-registries":["172.236.254.239:30880"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 3
          echo "--- Harbor login ---"
          echo "${{ secrets.HARBOR_TOOL_PASSWORD }}" | docker login 172.236.254.239:30880 \
            -u "${{ secrets.HARBOR_TOOL_USER }}" --password-stdin
          echo "--- Pull image ---"
          docker pull 172.236.254.239:30880/factory/agent:latest
          echo "--- Run container ---"
          docker rm -f factory-agent-test 2>/dev/null || true
          docker run -d --name factory-agent-test -p 34567:34567 \
            172.236.254.239:30880/factory/agent:latest
          sleep 5
          echo "--- Container status ---"
          docker ps -a
          echo "--- Container logs ---"
          docker logs factory-agent-test
          echo "--- Quick HTTP test ---"
          curl -sv http://127.0.0.1:34567/ 2>&1 || true

      - name: Run blind test
        env:
          IMAGE: 172.236.254.239:30880/factory/agent:latest
          CONTAINER: factory-agent-test
          PORT: "34567"
        run: |
          set -euxo pipefail
          chmod +x ./blindtest.sh
          ./blindtest.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blindtest-artifacts
          path: blindtest-artifacts
